<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyBuddy – Access Restricted</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #0f0f1a 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    .bg-orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: float 8s ease-in-out infinite;
    }
    .orb-1 {
      width: 400px; height: 400px;
      background: #6c47ff;
      top: -100px; left: -100px;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 300px; height: 300px;
      background: #a855f7;
      bottom: -80px; right: -80px;
      animation-delay: 3s;
    }
    .orb-3 {
      width: 200px; height: 200px;
      background: #3b82f6;
      top: 50%; left: 60%;
      animation-delay: 5s;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }

    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 90%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 2rem;
    }
    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #6c47ff, #a855f7);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .logo-text {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .separator {
      color: rgba(255,255,255,0.2);
      font-size: 1.4rem;
      margin: 0 4px;
    }
    .tagline {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
      font-weight: 400;
    }

    .icon-wrapper {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      background: rgba(108, 71, 255, 0.15);
      border: 1px solid rgba(108, 71, 255, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 1rem;
      color: #fff;
    }

    p {
      font-size: 1rem;
      color: rgba(255,255,255,0.55);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, #6c47ff, #a855f7);
      margin: 0 auto 2rem;
      border-radius: 2px;
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.2);
    }
    .footer a {
      color: rgba(255,255,255,0.35);
      text-decoration: none;
    }
    .footer a:hover {
      color: rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">📚</div>
      <span class="logo-text">StudyBuddy</span>
      <span class="separator">/</span>
      <span class="tagline">we're sorry.</span>
    </div>

    <div class="icon-wrapper">🌍</div>

    <h1>Your location does not allow<br/>access to this platform.</h1>

    <div class="divider"></div>

    <p>
      StudyBuddy is only available in certain regions.<br/>
      If you think this is a mistake, contact us.
    </p>

    <div class="footer">
      <a href="mailto:contact@studybuddy.ro">contact@studybuddy.ro</a>
    </div>
  </div>
</body>
</html>
