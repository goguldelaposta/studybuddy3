<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyBuddy – Access Restricted</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #0f0f1a 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* Particule */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(108, 71, 255, 0.6);
      border-radius: 50%;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0% { transform: translateY(-10px); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(100vh); opacity: 0; }
    }

    /* Orbe fundal */
    .bg-orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: orbFloat 10s ease-in-out infinite;
    }
    .orb-1 {
      width: 400px; height: 400px;
      background: #6c47ff;
      top: -100px; left: -100px;
      animation-duration: 10s;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 300px; height: 300px;
      background: #a855f7;
      bottom: -80px; right: -80px;
      animation-duration: 13s;
      animation-delay: 2s;
    }
    .orb-3 {
      width: 250px; height: 250px;
      background: #3b82f6;
      top: 40%; left: 55%;
      animation-duration: 8s;
      animation-delay: 4s;
    }
    @keyframes orbFloat {
      0%, 100% { transform: translateY(0px) scale(1); opacity: 0.18; }
      33% { transform: translateY(-30px) scale(1.05); opacity: 0.25; }
      66% { transform: translateY(15px) scale(0.95); opacity: 0.12; }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 90%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }

    /* Fade-in pentru fiecare element */
    .fade-in {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.6s ease forwards;
    }
    .fade-in:nth-child(1) { animation-delay: 0.1s; }
    .fade-in:nth-child(2) { animation-delay: 0.3s; }
    .fade-in:nth-child(3) { animation-delay: 0.5s; }
    .fade-in:nth-child(4) { animation-delay: 0.7s; }
    .fade-in:nth-child(5) { animation-delay: 0.9s; }
    .fade-in:nth-child(6) { animation-delay: 1.1s; }
    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 2rem;
    }
    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #6c47ff, #a855f7);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .logo-text {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .separator {
      color: rgba(255,255,255,0.2);
      font-size: 1.4rem;
      margin: 0 4px;
    }
    .tagline {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
      font-weight: 400;
    }

    /* Glob cu rotatie + pulsatie */
    .icon-wrapper {
      position: relative;
      width: 90px;
      height: 90px;
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ping {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(108, 71, 255, 0.3);
      animation: ping 2s ease-out infinite;
    }
    .ping-2 {
      animation-delay: 0.8s;
    }
    @keyframes ping {
      0% { transform: scale(0.8); opacity: 0.8; }
      100% { transform: scale(1.6); opacity: 0; }
    }
    .globe-circle {
      position: relative;
      z-index: 1;
      width: 80px;
      height: 80px;
      background: rgba(108, 71, 255, 0.15);
      border: 1px solid rgba(108, 71, 255, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      transition: opacity 0.4s ease;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 1rem;
      color: #fff;
    }

    p {
      font-size: 1rem;
      color: rgba(255,255,255,0.55);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, #6c47ff, #a855f7);
      margin: 0 auto 2rem;
      border-radius: 2px;
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.2);
    }
    .footer a {
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer a:hover {
      color: rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>

  <!-- Particule -->
  <div class="particles" id="particles"></div>

  <!-- Orbe fundal -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="card">
    <div class="logo fade-in">
      <div class="logo-icon">📚</div>
      <span class="logo-text">StudyBuddy</span>
      <span class="separator">/</span>
      <span class="tagline">mentenanță</span>
    </div>

    <div class="icon-wrapper fade-in">
      <div class="ping"></div>
      <div class="ping ping-2"></div>
      <div class="globe-circle" id="globe">🌍</div>
    </div>

    <h1 class="fade-in">Suntem în mentenanță.<br/>Revenim în curând!</h1>

    <div class="divider fade-in"></div>

    <p class="fade-in">
      Lucrăm la îmbunătățiri pentru tine.<br/>
      Ne cerem scuze pentru inconveniență.
    </p>

    <div class="footer fade-in">
      <a href="mailto:contact@studybuddy.ro">contact@studybuddy.ro</a>
    </div>

    <!-- Admin access - hidden -->
    <div id="admin-hint" style="position:fixed;bottom:10px;right:10px;width:20px;height:20px;cursor:pointer;opacity:0;" onclick="window.location.href='/sb-admin'"></div>
  </div>

  <script>
    // Rotire glob
    const globes = ['🌍', '🌎', '🌏'];
    let gi = 0;
    const globe = document.getElementById('globe');
    setInterval(() => {
      globe.style.opacity = '0';
      setTimeout(() => {
        gi = (gi + 1) % globes.length;
        globe.textContent = globes[gi];
        globe.style.opacity = '1';
      }, 200);
    }, 800);

    // Genereaza particule random
    const container = document.getElementById('particles');
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.width = (Math.random() * 2 + 1) + 'px';
      p.style.height = p.style.width;
      p.style.animationDuration = (Math.random() * 10 + 8) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      p.style.opacity = Math.random() * 0.5 + 0.2;
      container.appendChild(p);
    }
  </script>
</body>
</html>
